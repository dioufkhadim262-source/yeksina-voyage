<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEKSINA VOYAGE — Réservation en ligne</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --orange:#F09006;
  --navy:#2581c4;
  --bg:#F5F3EE;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#2581c4,#1a5d91);
  color:white;
  padding:60px 20px;
  text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.15);
}

/* 🔥 LOGO STYLE AJOUTÉ */
.logo{
  .logo{
  width:90px;
  height:90px;
  object-fit:contain;
  background:white;
  padding:10px;
  border-radius:20px;
  margin:0 auto 15px auto;
  display:block;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}
}

.hero h1{
  font-family:'Syne',sans-serif;
  font-size:60px;
  letter-spacing:2px;
}

.hero span{
  color:var(--orange);
}

.hero p{
  margin-top:15px;
  font-size:18px;
  opacity:0.95;
}

.container{
  max-width:1150px;
  margin:auto;
  padding:50px 20px;
}

/* CARDS */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

.card{
  border-radius:35px;
  overflow:hidden;
  background:white;
  transform:translateY(0);
  transition:0.4s;
  box-shadow:
    0 15px 35px rgba(0,0,0,0.12),
    0 5px 15px rgba(0,0,0,0.08);
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

.card-header{
  background:linear-gradient(135deg,#2581c4,#1f6ca6);
  padding:35px 25px;
  color:white;
}

.route-name{
  font-size:28px;
  font-weight:800;
}

.price{
  color:#FFD36B;
  font-size:38px;
  font-weight:900;
}

.depart{
  font-size:15px;
  opacity:0.9;
}

.reserve-btn{
  width:100%;
  background:linear-gradient(135deg,#F09006,#ffb347);
  border:none;
  padding:16px;
  color:white;
  cursor:pointer;
  margin-top:10px;
  border-radius:18px;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

.reserve-btn:hover{
  transform:scale(1.03);
}

/* FORM */
.form-box{
  display:none;
  background:white;
  padding:40px;
  margin-top:50px;
  border-radius:35px;
  box-shadow:0 15px 35px rgba(0,0,0,0.10);
}

.form-title{
  text-align:center;
  margin-bottom:25px;
  color:var(--navy);
  font-family:'Syne',sans-serif;
  font-size:32px;
}

.input-group{
  margin-bottom:20px;
}

.input-group input,
.input-group select{
  width:100%;
  padding:16px;
  border:1px solid #ddd;
  border-radius:18px;
  font-size:15px;
}

button{
  width:100%;
  padding:18px;
  background:linear-gradient(135deg,#F09006,#ffb347);
  color:white;
  border:none;
  border-radius:20px;
  font-weight:bold;
  font-size:17px;
  cursor:pointer;
}

#message{
  margin-top:20px;
  text-align:center;
  font-weight:bold;
}

footer{
  margin-top:70px;
  text-align:center;
  padding:30px;
  background:var(--navy);
  color:white;
  font-weight:600;
}
.logo{
  width:160px;
  display:block;
  margin:0 auto 20px auto;
  object-fit:contain;
}

</style>
</head>

<body>

<header class="hero">

  <!-- 🔥 LOGO INTÉGRÉ -->
  <div class="logo">
      <img src="logo.png" class="logo" alt="logo">>
    </div>

  <h1>YEKSINA <span>VOYAGE</span></h1>

  <p>
    Réservez vos voyages universitaires rapidement et payez avec Wave.
  </p>

</header>

<main class="container">

<div class="cards-grid">

  <div class="card">
    <div class="card-header">
      <div class="route-name">UGB → DAKAR</div>
      <div class="price">4000 FCFA</div>
      <div class="depart">Départ : 04h45</div>
      <button class="reserve-btn" onclick="ouvrirFormulaire('Dakar')">Réserver</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="route-name">UGB → TOUBA</div>
      <div class="price">5000 FCFA</div>
      <div class="depart">Départ : 04h45</div>
      <button class="reserve-btn" onclick="ouvrirFormulaire('Touba')">Réserver</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="route-name">UGB → KAOLACK</div>
      <div class="price">6600 FCFA</div>
      <div class="depart">Départ : 04h45</div>
      <button class="reserve-btn" onclick="ouvrirFormulaire('Kaolack')">Réserver</button>
    </div>
  </div>

</div>

<div class="form-box">

  <h2 class="form-title">Réserver maintenant</h2>

  <form id="reservationForm">

    <div class="input-group">
      <input type="text" id="nom" placeholder="Nom complet" required>
    </div>

    <div class="input-group">
      <input type="text" id="telephone" placeholder="Téléphone" required>
    </div>

    <div class="input-group">
      <select id="trajet"></select>
    </div>

    <div class="input-group">
      <select id="date">
        <option value="2026-05-22">22 Mai</option>
        <option value="2026-05-23">23 Mai</option>
        <option value="2026-05-24">24 Mai</option>
      </select>
    </div>

    <div class="input-group">
      <input type="number" id="places" value="1">
    </div>

    <button type="submit">Payer avec Wave</button>

  </form>

  <div id="message"></div>

</div>

</main>

<footer>
  YEKSINA VOYAGE © 2026
</footer>

<script>

["Dakar","Touba","Kaolack"].forEach(t=>{
  document.getElementById("trajet").innerHTML += `<option value="${t}">${t}</option>`;
});

function ouvrirFormulaire(dest){
  document.querySelector(".form-box").style.display="block";
  document.getElementById("trajet").value = dest;
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

function normalizeTel(t){return t.replace(/\D/g,"");}

document.getElementById("reservationForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const res = await fetch("/reserver",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nom:document.getElementById("nom").value,
      telephone:normalizeTel(document.getElementById("telephone").value),
      trajet:document.getElementById("trajet").value,
      places:document.getElementById("places").value,
      date:document.getElementById("date").value
    })
  });

  const data = await res.json();

  if(data.success){
    window.location.href = data.paymentUrl;
  } else {
    document.getElementById("message").innerHTML = data.message;
  }
});

</script>

</body>
</html>
