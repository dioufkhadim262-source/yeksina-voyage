<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEKSINA VOYAGE — Réservation en ligne</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --orange:#FF6B00;
  --navy:#0B1F4E;
  --bg:#F5F3EE;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
}

.hero{
  background:var(--navy);
  color:white;
  padding:70px 20px;
  text-align:center;
}

.hero h1{
  font-family:'Syne',sans-serif;
  font-size:60px;
}

.hero span{color:var(--orange);}

.container{max-width:1100px;margin:auto;padding:40px 20px;}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-header{
  background:var(--navy);
  padding:25px;
  color:white;
}

.route-name{font-size:24px;font-weight:bold;}
.price{color:var(--orange);font-size:30px;font-weight:bold;}

.reserve-btn{
  width:100%;
  background:var(--orange);
  border:none;
  padding:14px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* FORM */
.form-box{
  display:none;
  background:white;
  padding:30px;
  margin-top:30px;
  border-radius:20px;
}

.input-group{margin-bottom:15px;}

.input-group input,
.input-group select{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
}

button{
  width:100%;
  padding:15px;
  background:var(--orange);
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

#message{margin-top:15px;text-align:center;}

</style>
</head>

<body>

<header class="hero">
  <h1>YEKSINA <span>VOYAGE</span></h1>
</header>

<main class="container">

<!-- TRAJETS -->
<div class="cards-grid">

  <div class="card">
    <div class="card-header">
      <div class="route-name">UGB → DAKAR</div>
      <div class="price">4000 FCFA</div>
      <button class="reserve-btn" onclick="ouvrirFormulaire('Dakar')">Réserver</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="route-name">UGB → TOUBA</div>
      <div class="price">5000 FCFA</div>
      <button class="reserve-btn" onclick="ouvrirFormulaire('Touba')">Réserver</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="route-name">UGB → KAOLACK</div>
      <div class="price">6500 FCFA</div>
      <button class="reserve-btn" onclick="ouvrirFormulaire('Kaolack')">Réserver</button>
    </div>
  </div>

</div>

<!-- FORM -->
<div class="form-box">

  <form id="reservationForm">

    <div class="input-group">
      <input type="text" id="nom" placeholder="Nom complet" required>
    </div>

    <div class="input-group">
      <input type="text" id="telephone" placeholder="Téléphone (+221...)" required>
    </div>

    <div class="input-group">
      <select id="trajet"></select>
    </div>

    <!-- ✔️ DATES -->
    <div class="input-group">
      <select id="date">
        <option value="2026-05-22">22 Mai</option>
        <option value="2026-05-23">23 Mai</option>
        <option value="2026-05-24">24 Mai</option>
      </select>
    </div>

    <div class="input-group">
      <input type="number" id="places" min="1" max="10" value="1">
    </div>

    <button type="submit">Payer avec Wave</button>

  </form>

  <div id="message"></div>

</div>

</main>

<script>

/* remplir trajets */
const trajetSelect = document.getElementById("trajet");
["Dakar","Touba","Kaolack"].forEach(t=>{
  trajetSelect.innerHTML += `<option value="${t}">${t}</option>`;
});

function ouvrirFormulaire(dest){
  document.querySelector(".form-box").style.display="block";
  document.getElementById("trajet").value = dest;
  window.scrollTo({ top: document.body.scrollHeight, behavior:"smooth" });
}

/* nettoyage téléphone */
function normalizeTel(t){
  return t.replace(/\D/g,"");
}

document.getElementById("reservationForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const nom = document.getElementById("nom").value;
  const telephone = normalizeTel(document.getElementById("telephone").value);
  const trajet = document.getElementById("trajet").value;
  const places = document.getElementById("places").value;
  const date = document.getElementById("date").value;

  const message = document.getElementById("message");
  message.innerHTML = "⏳ Traitement...";

  try{
    const res = await fetch("/reserver",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        nom,
        telephone,
        trajet,
        places,
        date
      })
    });

    const data = await res.json();

    if(data.success){
      window.location.href = data.paymentUrl;
    }else{
      message.style.color="red";
      message.innerHTML=data.message;
    }

  }catch(err){
    message.style.color="red";
    message.innerHTML="Erreur serveur";
  }
});

</script>

</body>
</html>
